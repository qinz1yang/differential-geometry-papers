name: Lean Build CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout differential-geometry
        uses: actions/checkout@v4
        with:
          repository: qinz1yang/differential-geometry
          path: deps/differential-geometry

      - name: Symlink differential-geometry for lakefile
        run: |
          mkdir -p ../differential-geometry
          ln -s $GITHUB_WORKSPACE/deps/differential-geometry/* ../differential-geometry/ || true

      - name: Install elan and Lean 4.28
        run: |
          curl -O --location https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh
          chmod +x elan-init.sh
          ./elan-init.sh -y --default-toolchain leanprover/lean4:v4.28.0
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Build with Lake
        run: |
          cd CaoHamilton2008
          lake exe cache get
          lake build